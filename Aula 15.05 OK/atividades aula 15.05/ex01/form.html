<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>

<style>
   body{
    background-color: #f2f2f2;
    max-width: 1000px;
    margin: auto;
    font-family: Arial, Helvetica, sans-serif;
}

h1{
    text-align: right;
    color: purple;
    font-size: 60px;
    margin-right: 50px;
    border-bottom: 2px solid purple;
}

img{
    float: left;
    width: 120px;
    margin-top: 20px;
}

form{
    margin-left: 140px;
}

fieldset{
    border: 3px solid #f7caca;
    padding: 20px;
    margin-bottom: 20px;
    width: 700px;
}

legend{
    font-size: 20px;
}

label{
    display: inline-block;
    width: 120px;
    font-size: 18px;
    margin-bottom: 15px;
}

input{
    width: 550px;
    height: 25px;
    background-color: #f7caca;
    border: none;
}

textarea{
    width: 550px;
    height: 50px;
    background-color: #f7caca;
    border: none;
    resize: none;
}

button{
    background-color: #f7caca;
    border: none;
    width: 120px;
    height: 35px;
    margin-left: 15px;
    cursor: pointer;
    font-size: 16px;
}
</style>

</head>
<body>
    


<h1>Dados da conta</h1>
<img src="form1_back.jpg" alt="">
    <form action="">
        <fieldset>
            <legend>Dados Pessoais:</legend>
            <label for="">Nome: </label> <input type="text">
            <br>
            <label for="">Email: </label> <input type="email" name="" id="">
        </fieldset>
    <br>
        <fieldset>
            <legend>Dados da Conta:</legend>
            <label for="">Senha: </label> <input type="text">
            <br>
            <label for="">Frase opcional:</label>  <textarea name="" id="" cols="40" rows="1"></textarea>
        </fieldset>
    
        <button>enviar</button>

    </form>
</body>
</html>
